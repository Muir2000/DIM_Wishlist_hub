# 프론트엔드 nginx: SPA 정적 서빙 + /api → 백엔드 프록시.
server {
  listen 80;
  server_name _;

  # 외부 위시리스트(.txt) 가져오기는 수 MB 가 될 수 있음 — 업로드 한도 상향(기본 1MB).
  client_max_body_size 16m;

  # /api/* → 백엔드(:8000). 끝 슬래시로 /api 접두 제거.
  # 예) /api/weapons → backend:8000/weapons, /api/auth/bungie/callback → backend:8000/auth/bungie/callback
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # SPA: 정적 파일, 없으면 index.html 폴백.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
